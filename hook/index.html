<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <script src="node_modules/gsap/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1280px; height: 720px; overflow: hidden; background: #000; }
      body { font-family: Arial, Helvetica, sans-serif; }
      #bg {
        position: absolute; inset: -60px;
        background: radial-gradient(900px 600px at 30% 20%, #2c1a4d 0%, #0d0d14 55%, #000 100%);
      }
      #glow {
        position: absolute; left: 50%; top: 58%; width: 900px; height: 220px;
        transform: translate(-50%, -50%);
        background: radial-gradient(closest-side, rgba(255, 45, 85, 0.28), transparent 70%);
        filter: blur(10px);
      }
      #kicker {
        position: absolute; left: 50%; top: 200px; transform: translateX(-50%);
        font-size: 22px; letter-spacing: 8px; color: #ff2d55; font-weight: 700;
      }
      #title {
        position: absolute; left: 50%; top: 300px; transform: translateX(-50%);
        width: 1100px; text-align: center;
        font-size: 84px; line-height: 1.05; font-weight: 900; color: #fff;
        text-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
      }
      #rule {
        position: absolute; left: 50%; top: 508px; transform: translateX(-50%);
        width: 0; height: 6px; background: #ff2d55; border-radius: 3px;
      }
      #channel {
        position: absolute; left: 50%; top: 560px; transform: translateX(-50%);
        font-size: 20px; color: rgba(255, 255, 255, 0.75); letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1280"
      data-height="720"
    >
      <div id="bg" class="clip" data-start="0" data-duration="6" data-track-index="0"></div>
      <div id="glow" class="clip" data-start="0" data-duration="6" data-track-index="1"></div>
      <div id="kicker" class="clip" data-start="0" data-duration="6" data-track-index="2">UNSOLVED</div>
      <div id="title" class="clip" data-start="0" data-duration="6" data-track-index="3">
        THE CITY THAT VANISHED OVERNIGHT
      </div>
      <div id="rule" class="clip" data-start="0" data-duration="6" data-track-index="4"></div>
      <div id="channel" class="clip" data-start="0" data-duration="6" data-track-index="5">VIDRUSH TEST</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#bg", { scale: 1.12 }, { scale: 1, duration: 6, ease: "none" }, 0);
      tl.fromTo("#glow", { opacity: 0 }, { opacity: 1, duration: 1.4, ease: "power2.out" }, 0.2);
      tl.fromTo("#kicker", { opacity: 0, y: -24 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.3);
      tl.fromTo("#title", { opacity: 0, y: 46, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 1.0, ease: "power3.out" }, 0.55);
      tl.to("#rule", { width: 420, duration: 0.8, ease: "power2.inOut" }, 1.3);
      tl.fromTo("#channel", { opacity: 0 }, { opacity: 1, duration: 0.6 }, 1.7);
      tl.to(["#kicker", "#title", "#rule", "#channel"], { opacity: 0, y: -20, duration: 0.5, ease: "power2.in" }, 5.4);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
