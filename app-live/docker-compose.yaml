# Docker Compose configuration for the kakkao-stack development environment

name: kakkao-stack
services:
  kakkao:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/morphic}:latest
    command: npx next start -H 0.0.0.0
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - kakkao:builder
        - kakkao:latest
    env_file: .env.local # Load environment variables
    environment:
      # Database connection for Docker Compose (override any cloud DB from .env.local)
      DATABASE_URL: postgresql://${POSTGRES_USER:-kakkao}:${POSTGRES_PASSWORD:-kakkao}@postgres:5432/${POSTGRES_DB:-kakkao}
      DATABASE_RESTRICTED_URL: postgresql://${POSTGRES_USER:-kakkao}:${POSTGRES_PASSWORD:-kakkao}@postgres:5432/${POSTGRES_DB:-kakkao}
      DATABASE_SSL_DISABLED: 'true' # Disable SSL for local Docker PostgreSQL
      # Authentication settings (default: disabled for personal Docker use)
      ENABLE_AUTH: ${ENABLE_AUTH:-false}
      ANONYMOUS_USER_ID: ${ANONYMOUS_USER_ID:-docker-anonymous}
      KAKKAO_CLOUD_DEPLOYMENT: 'false'
      # Docker-internal service URLs
      LOCAL_REDIS_URL: ${LOCAL_REDIS_URL:-redis://redis:6379}
      SEARCH_API: ${SEARCH_API:-searxng}
      SEARXNG_API_URL: ${SEARXNG_API_URL:-http://searxng:8080}
    ports:
      - '3000:3000' # Maps port 3000 on the host to port 3000 in the container.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kakkao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kakkao}
      POSTGRES_DB: ${POSTGRES_DB:-kakkao}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kakkao}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  searxng:
    image: searxng/searxng
    ports:
      - '${SEARXNG_PORT:-8080}:8080'
    env_file: .env.local # can remove if you want to use env variables or in settings.yml
    volumes:
      - ./searxng-limiter.toml:/etc/searxng/limiter.toml
      - ./searxng-settings.yml:/etc/searxng/settings.yml
      - searxng_data:/data

volumes:
  postgres_data:
  redis_data:
  searxng_data:
