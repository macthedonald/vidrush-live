# Fly.io config for the VidRush render worker.
# Scales to zero when idle (auto_stop_machines) and boots on the next render request,
# so it costs ~nothing between renders. Bump cpus/memory for longer/4K videos.
app = "vidrush-render"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  # Renders are CPU-heavy; keep concurrency low so one machine isn't oversubscribed.
  soft_limit = 2
  hard_limit = 4

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
