# Fly.io config for the Kakkao watch-service. Deploy: `fly launch --copy-config --now`
# then `fly secrets set WATCH_SERVICE_TOKEN=… GROQ_API_KEY=…`.
# App names are globally unique — change `app` if taken.
app = "kakkao-watch"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "30s"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
